<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RealityLens AR Demo</title>

    <!-- Model Viewer Script -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #111;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        model-viewer {
            width: 100%;
            height: 80vh;
        }

        .btn {
            margin-top: 15px;
            padding: 12px 20px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>RealityLens AR Demo</h1>

    <model-viewer
    src="model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    style="background-color: #222;">
</model-viewer>
</body>

</html>
