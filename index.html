<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RealityLens AR Demo</title>

  <!-- Model Viewer Script -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 15px 0;
      background-color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    header img {
      height: 60px;
    }

    h1 {
      margin: 20px 0 10px;
      font-size: 28px;
      text-align: center;
    }

    p.instructions {
      margin-bottom: 15px;
      color: #aaa;
      font-size: 16px;
      text-align: center;
    }

    model-viewer {
      width: 90%;
      max-width: 700px;
      height: 80vh;
      background-color: #222;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }
    <p id="ar-cta" style="
    text-align:center;
    margin-top:10px;
    font-size:18px;
    color:#00ffcc;
    font-weight:bold;
    cursor:pointer;
">
    📱 Tap here to view in AR
</p>
#ar-cta {
  text-align:center;
  font-size:18px;
  color:#00ffcc;
  font-weight:bold;
  cursor:pointer;
  padding: 8px 12px;
  border-radius: 8px;
  background: rgba(0,255,204,0.2);
  transition: transform 0.2s;
}

#ar-cta:hover {
  transform: scale(1.1);
}
    /* Loading Spinner */
    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 8px solid #f3f3f3;
      border-top: 8px solid #00ffcc;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      z-index: 10;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg);}
      100% { transform: translate(-50%, -50%) rotate(360deg);}
    }

    /* QR Code Section */
    .qr-section {
      margin-top: 20px;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }

    .qr-section img {
      margin-top: 10px;
      width: 120px;
      height: 120px;
    }
  </style>
</head>

<body>

  <!-- Header / Logo -->
 <header>
  <img src="logo.png" alt="RealityLens Logo">
</header>

  <h1>RealityLens AR Demo</h1>
  <p class="instructions">Use mouse to rotate, pinch to zoom. On mobile, tap the AR button to place the model in your room.</p>

  <!-- Loading Spinner -->
  <div id="loader"></div>

  <!-- 3D Model Viewer -->
  <model-viewer
      id="modelViewer"
      src="model.glb"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      style="display:block;">
  </model-viewer>

  <!-- QR Code (Optional) -->
  <div class="qr-section">
    Scan QR to view on mobile:
    <br>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://ammarranaa.github.io/Reailty-lens-/" alt="QR Code">
  </div>
   <footer style="margin-top: 30px; padding: 15px 0; width: 100%; text-align: center; font-size: 14px; color: #555; background-color: #111;">
  Developed by <a href="https://github.com/AmmarRanaa" target="_blank" style="color:#00ffcc; text-decoration:none;">Ammar Rana</a>
</footer>

  <script>
    const loader = document.getElementById('loader');
    const modelViewer = document.getElementById('modelViewer');

    // Hide loader when model is ready
    modelViewer.addEventListener('load', () => {
      loader.style.display = 'none';
    });
   
  </script>
  <script>
  const loader = document.getElementById('loader');
  const modelViewer = document.getElementById('modelViewer');

  // Hide loader when model is ready
  modelViewer.addEventListener('load', () => {
    loader.style.display = 'none';
  });

  // --- AR CTA ---
  const arCTA = document.getElementById('ar-cta');

  arCTA.addEventListener('click', () => {
    // Enter AR mode
    modelViewer.enterAR();
  });
</script>

</body>
</html>
